name: Dotorixel
options:
  bundleIdPrefix: com.dotorixel
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"

targets:
  Dotorixel:
    type: application
    supportedDestinations: [macOS, iOS]
    sources:
      - path: Dotorixel
      - path: generated
        includes:
          - "*.swift"
    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: $(SRCROOT)/Dotorixel/Dotorixel-Bridging-Header.h
        HEADER_SEARCH_PATHS: $(SRCROOT)/generated
        LIBRARY_SEARCH_PATHS: $(SRCROOT)/build/lib
        OTHER_LDFLAGS: -ldotorixel_apple
        PRODUCT_BUNDLE_IDENTIFIER: com.dotorixel.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        # Ad-hoc signing for local development; re-enable for distribution builds
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
    preBuildScripts:
      - name: Build Rust Library
        script: |
          "${SRCROOT}/scripts/build-rust.sh"
        basedOnDependencyAnalysis: false

  DotorixelTests:
    type: bundle.unit-test
    supportedDestinations: [macOS, iOS]
    sources:
      - path: DotorixelTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        HEADER_SEARCH_PATHS: $(SRCROOT)/generated
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Dotorixel.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Dotorixel"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: Dotorixel

schemes:
  Dotorixel:
    build:
      targets:
        Dotorixel: all
        DotorixelTests: [test]
    test:
      targets:
        - DotorixelTests
